<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Canvas AI - 智能画板</title>
    <style>
        :root {
            --bg-deep: #020617;
            --bg-mid: #0f172a;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.5);
            --toolbar-h: 64px;
            --sidebar-w: 72px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        .glow-1 { width:600px; height:600px; background: var(--accent-glow); top:-200px; left:-100px; }
        .glow-2 { width:500px; height:500px; background: rgba(139,92,246,0.4); bottom:-150px; right:-100px; animation-delay:-7s; }
        @keyframes float {
            0%,100%{transform:translate(0,0) scale(1);}
            50%{transform:translate(30px,-30px) scale(1.1);}
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .topbar {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 300px;
            height: var(--toolbar-h);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            z-index: 100;
        }
        .logo { display:flex; align-items:center; gap:10px; margin-right:16px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text { font-size: 16px; font-weight: 700; }
        .divider { width:1px; height:28px; background: linear-gradient(180deg,transparent,var(--glass-border),transparent); margin:0 4px; }
        .tool-group { display:flex; gap:4px; }
        .btn {
            width: 40px; height: 40px;
            border: none; border-radius: 10px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            position: relative;
        }
        .btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
        .btn.active { background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.3)); color: var(--accent); }
        .btn svg { width:20px; height:20px; fill:currentColor; }
        .spacer { flex:1; }
        .zoom { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-secondary); }
        .sidebar {
            position: fixed;
            top: calc(var(--toolbar-h) + 24px);
            left: 12px;
            bottom: 48px;
            width: var(--sidebar-w);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 2px;
            z-index: 90;
        }
        .tool {
            width: 64px; height: 64px;
            border: none; border-radius: 14px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 3px;
            transition: all 0.25s;
        }
        .tool:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); transform: scale(1.05); }
        .tool.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.3));
            color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-glow), 0 4px 20px var(--accent-glow);
        }
        .tool svg { width:22px; height:22px; fill:currentColor; }
        .tool span { font-size: 10px; font-weight: 500; }
        .side-divider { width:36px; height:1px; background: linear-gradient(90deg,transparent,var(--glass-border),transparent); margin:6px 0; }
        .canvas-wrap {
            position: fixed;
            top: calc(var(--toolbar-h) + 24px);
            left: calc(var(--sidebar-w) + 28px);
            right: 300px;
            bottom: 44px;
            border-radius: 16px;
            background: rgba(15,23,42,0.3);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
            overflow: hidden;
        }
        #canvas {
            background: #fff;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            cursor: crosshair;
            border-radius: 4px;
        }
        .canvas-info {
            position: fixed;
            bottom: 56px;
            left: calc(var(--sidebar-w) + 40px);
            z-index: 80;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--glass-border);
        }
        .status {
            position: fixed;
            bottom: 12px;
            left: calc(var(--sidebar-w) + 28px);
            right: 300px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            z-index: 90;
        }
        .status-left, .status-right { display:flex; gap:12px; align-items:center; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22d3ee;
            box-shadow: 0 0 8px #22d3ee;
        }
        .status-dot.draw { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); animation: blink 0.5s infinite alternate; }
        @keyframes blink { from{opacity:1} to{opacity:0.5} }
        .panel {
            position: fixed;
            top: 12px;
            right: 12px;
            bottom: 12px;
            width: 280px;
            border-radius: 16px;
            padding: 20px;
            z-index: 90;
            overflow-y: auto;
        }
        .panel-sec { margin-bottom: 24px; }
        .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
        .panel-accent { width: 24px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #8b5cf6); }
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 12px; }
        .swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
        .swatch:hover { transform: scale(1.2); }
        .swatch.active { border-color: #fff; box-shadow: 0 0 0 3px var(--bg-deep), 0 0 0 5px var(--accent), 0 4px 16px var(--accent-glow); }
        .swatch.custom { background: conic-gradient(from 0deg, #ef4444, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6, #ec4899, #ef4444); }
        .color-input { display: flex; align-items: center; gap: 8px; padding: 6px; border-radius: 10px; border: 1px solid var(--glass-border); }
        .color-input input[type="color"] { width:36px; height:36px; border:none; border-radius:8px; cursor:pointer; background:none; }
        .color-input input[type="text"] { flex:1; background:transparent; border:none; color:var(--text-secondary); font-size:13px; font-family:monospace; outline:none; }
        .slider-box { margin-bottom: 16px; }
        .slider-head { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; }
        .slider-val { background: rgba(255,255,255,0.1); padding:2px 8px; border-radius:4px; font-size:11px; }
        .slider-track { position: relative; height: 32px; border-radius: 10px; display: flex; align-items: center; padding: 0 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .slider-track input[type="range"] { width: 100%; height: 4px; border-radius: 2px; background: transparent; outline: none; -webkit-appearance: none; }
        .slider-track input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #8b5cf6); cursor: pointer; border: 2px solid var(--bg-deep); box-shadow: 0 2px 10px var(--accent-glow); }
        .slider-fill { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); height: 4px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), #8b5cf6); pointer-events: none; }
        .brush-preview { display: flex; align-items: center; justify-content: center; height: 60px; background: var(--glass-bg); border-radius: 10px; border: 1px solid var(--glass-border); margin-top: 10px; }
        .brush-dot { border-radius: 50%; background: var(--accent); box-shadow: 0 0 20px var(--accent-glow); transition: all 0.2s; }
        .ai-panel { position: fixed; top: 12px; right: 12px; bottom: 12px; width: 320px; border-radius: 16px; padding: 0; z-index: 95; overflow-y: auto; transform: translateX(calc(100% + 20px)); transition: transform 0.4s; }
        .ai-panel.open { transform: translateX(0); }
        .ai-panel.open ~ .panel { display: none; }
        .ai-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; border-bottom: 1px solid var(--glass-border); }
        .ai-title { font-size: 16px; font-weight: 700; }
        .ai-close { width:32px; height:32px; border:none; border-radius:8px; background:var(--glass-bg); color:var(--text-secondary); cursor:pointer; }
        .ai-close:hover { background:var(--glass-bg-hover); color:var(--text-primary); }
        .ai-tabs { display: flex; gap: 4px; padding: 12px 20px; border-bottom: 1px solid var(--glass-border); }
        .ai-tab { flex: 1; padding: 8px 4px; border: none; border-radius: 8px; background: transparent; color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .ai-tab:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
        .ai-tab.active { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.2)); color: #fbbf24; }
        .ai-content { display: none; padding: 16px 20px; flex-direction: column; gap: 14px; }
        .ai-content.active { display: flex; }
        .ai-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .ai-textarea { width: 100%; min-height: 60px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px; color: var(--text-primary); font-size: 13px; font-family: inherit; resize: vertical; outline: none; }
        .ai-textarea:focus { border-color: rgba(245,158,11,0.5); }
        .ai-styles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .ai-style { padding: 8px 4px; border: 1px solid var(--glass-border); border-radius: 8px; background: var(--glass-bg); color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .ai-style:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
        .ai-style.active { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.2)); color: #fbbf24; border-color: rgba(245,158,11,0.4); }
        .ai-sizes { display: flex; gap: 6px; }
        .ai-size { flex: 1; padding: 8px 4px; border: 1px solid var(--glass-border); border-radius: 8px; background: var(--glass-bg); color: var(--text-secondary); font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .ai-size:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
        .ai-size.active { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.2)); color: #fbbf24; border-color: rgba(245,158,11,0.4); }
        .ai-gen { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; }
        .ai-gen:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,158,11,0.4); }
        .ai-overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.9); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .ai-overlay.show { opacity: 1; pointer-events: all; }
        .ai-load-text { font-size: 18px; font-weight: 600; color: #fbbf24; margin-bottom: 8px; }
        .ai-load-sub { font-size: 14px; color: var(--text-secondary); }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-mid); color: var(--text-primary); padding: 12px 24px; border-radius: 12px; font-size: 14px; border: 1px solid var(--glass-border); opacity: 0; pointer-events: none; transition: all 0.4s; z-index: 1000; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="ai-overlay" id="aiOverlay">
        <div>
            <div class="ai-load-text">AI 正在创作中...</div>
            <div class="ai-load-sub">请稍候，艺术即将呈现</div>
        </div>
    </div>
    <div class="topbar glass">
        <div class="logo">
            <div class="logo-icon">🎨</div>
            <span class="logo-text">Liquid Canvas <span style="color:#fbbf24">AI</span></span>
        </div>
        <div class="divider"></div>
        <div class="tool-group">
            <button class="btn" id="btnUndo" title="撤销">
                <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <button class="btn" id="btnRedo" title="重做">
                <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
            </button>
        </div>
        <div class="divider"></div>
        <div class="tool-group">
            <button class="btn" id="btnNew" title="新建">📄</button>
            <button class="btn" id="btnSave" title="保存">💾</button>
            <button class="btn" id="btnClear" title="清空">🗑️</button>
        </div>
        <div class="spacer"></div>
        <button class="btn" id="btnAIPanel" title="AI" style="color:#fbbf24">✨</button>
        <div class="zoom">
            <button class="btn" id="btnZoomOut">−</button>
            <span id="zoomVal">100%</span>
            <button class="btn" id="btnZoomIn">+</button>
        </div>
    </div>
    <div class="sidebar glass">
        <button class="tool active" data-tool="pen">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <span>画笔</span>
        </button>
        <button class="tool" data-tool="eraser">
            <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20h7.34l7.63-7.63c.78-.78.78-2.05 0-2.83l-4.24-4.24c-.39-.39-.9-.59-1.41-.59z"/></svg>
            <span>橡皮</span>
        </button>
        <button class="tool" data-tool="line">
            <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span>直线</span>
        </button>
        <button class="tool" data-tool="rect">
            <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" fill="none" stroke="currentColor" stroke-width="2" rx="2"/></svg>
            <span>矩形</span>
        </button>
        <button class="tool" data-tool="circle">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            <span>圆形</span>
        </button>
        <button class="tool" data-tool="fill">
            <svg viewBox="0 0 24 24"><path d="M19 3l-3 3-2-2 3-3 2 2z"/><path d="M14 6l-8 8v6h6l8-8-6-6z" fill="currentColor"/></svg>
            <span>填充</span>
        </button>
        <div class="side-divider"></div>
        <button class="tool" data-tool="picker">
            <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42z"/></svg>
            <span>取色</span>
        </button>
    </div>
    <div class="canvas-wrap">
        <canvas id="canvas" width="1200" height="800"></canvas>
    </div>
    <div class="canvas-info glass" id="canvasInfo">1200 × 800 px</div>
    <div class="status glass">
        <div class="status-left">
            <div style="display:flex;align-items:center;gap:6px">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">就绪</span>
            </div>
            <span style="color:var(--glass-border)">|</span>
            <span id="toolName">画笔工具</span>
            <span style="color:var(--glass-border)">|</span>
            <span id="coords">x: 0, y: 0</span>
        </div>
        <div class="status-right">
            <span id="historyInfo">历史: 0/0</span>
        </div>
    </div>
    <div class="panel glass" id="rightPanel">
        <div class="panel-sec">
            <div class="panel-head"><div class="panel-title">颜色</div><div class="panel-accent"></div></div>
            <div class="color-grid">
                <div class="swatch active" style="background:#0f172a" data-color="#0f172a"></div>
                <div class="swatch" style="background:#f8fafc" data-color="#f8fafc"></div>
                <div class="swatch" style="background:#ef4444" data-color="#ef4444"></div>
                <div class="swatch" style="background:#f97316" data-color="#f97316"></div>
                <div class="swatch" style="background:#eab308" data-color="#eab308"></div>
                <div class="swatch" style="background:#22c55e" data-color="#22c55e"></div>
                <div class="swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
                <div class="swatch" style="background:#8b5cf6" data-color="#8b5cf6"></div>
                <div class="swatch" style="background:#ec4899" data-color="#ec4899"></div>
                <div class="swatch" style="background:#06b6d4" data-color="#06b6d4"></div>
                <div class="swatch" style="background:#64748b" data-color="#64748b"></div>
                <div class="swatch custom" data-color="custom"></div>
            </div>
            <div class="color-input">
                <input type="color" id="customColor" value="#3b82f6">
                <input type="text" id="colorHex" value="#3B82F6" readonly>
            </div>
        </div>
        <div class="panel-sec">
            <div class="panel-head"><div class="panel-title">笔刷大小</div><div class="panel-accent"></div></div>
            <div class="slider-box">
                <div class="slider-head"><span>粗细</span><span class="slider-val" id="sizeVal">5px</span></div>
                <div class="slider-track">
                    <input type="range" id="brushSize" min="1" max="100" value="5">
                    <div class="slider-fill" id="sizeFill" style="width:4%"></div>
                </div>
            </div>
            <div class="brush-preview"><div class="brush-dot" id="brushPreview" style="width:5px;height:5px"></div></div>
        </div>
        <div class="panel-sec">
            <div class="panel-head"><div class="panel-title">不透明度</div><div class="panel-accent"></div></div>
            <div class="slider-box">
                <div class="slider-head"><span>透明度</span><span class="slider-val" id="opacityVal">100%</span></div>
                <div class="slider-track">
                    <input type="range" id="opacity" min="0" max="100" value="100">
                    <div class="slider-fill" id="opacityFill" style="width:100%"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="ai-panel glass" id="aiPanel">
        <div class="ai-head">
            <div class="ai-title">✨ AI 智能绘画</div>
            <button class="ai-close" id="btnCloseAI">✕</button>
        </div>
        <div class="ai-tabs">
            <button class="ai-tab active" data-mode="text2img">文生图</button>
            <button class="ai-tab" data-mode="img2img">图生图</button>
        </div>
        <div class="ai-content active" id="text2imgContent">
            <div>
                <div class="ai-label">描述你想画的画面</div>
                <textarea class="ai-textarea" id="aiPrompt" placeholder="例如：一只可爱的橘猫在樱花树下睡觉..." rows="3"></textarea>
            </div>
            <div>
                <div class="ai-label">风格</div>
                <div class="ai-styles">
                    <button class="ai-style active" data-style="default">默认</button>
                    <button class="ai-style" data-style="anime">动漫</button>
                    <button class="ai-style" data-style="watercolor">水彩</button>
                    <button class="ai-style" data-style="oil">油画</button>
                    <button class="ai-style" data-style="sketch">素描</button>
                    <button class="ai-style" data-style="cyberpunk">赛博</button>
                </div>
            </div>
            <div>
                <div class="ai-label">尺寸</div>
                <div class="ai-sizes">
                    <button class="ai-size active" data-size="1024x1024">1:1</button>
                    <button class="ai-size" data-size="1024x768">4:3</button>
                    <button class="ai-size" data-size="768x1024">3:4</button>
                </div>
            </div>
            <button class="ai-gen" id="btnGenText">🎨 生成图片</button>
        </div>
        <div class="ai-content" id="img2imgContent">
            <div>
                <div class="ai-label">基于当前画布优化</div>
                <textarea class="ai-textarea" id="aiImgPrompt" placeholder="描述优化方向..." rows="2"></textarea>
            </div>
            <button class="ai-gen" id="btnGenImg">✨ 优化画布</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let isDrawing = false, currentTool = 'pen', currentColor = '#0f172a';
        let currentSize = 5, currentOpacity = 1, zoomLevel = 1;
        let startPos = null, lastPos = null, tempCanvas = null;
        let history = [], historyStep = -1;
        const MAX_HISTORY = 50;
        const toolNames = { pen: '画笔工具', eraser: '橡皮擦', line: '直线工具', rect: '矩形工具', circle: '圆形工具', fill: '填充工具', picker: '取色器' };
        const stylePrompts = { default: '', anime: ', anime style, vibrant colors', watercolor: ', watercolor painting, soft edges', oil: ', oil painting, rich textures', sketch: ', pencil sketch, line art', cyberpunk: ', cyberpunk, neon lights, futuristic' };

        function init() {
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = '1200px'; canvas.style.height = '800px';
            canvas.width = 1200 * dpr; canvas.height = 800 * dpr;
            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 1200, 800);
            saveHistory(); bindEvents(); updateGlow(currentColor);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) * (1200 / rect.width) / zoomLevel, y: (e.clientY - rect.top) * (800 / rect.height) / zoomLevel };
        }

        function saveHistory() {
            if (historyStep < history.length - 1) history = history.slice(0, historyStep + 1);
            history.push(canvas.toDataURL());
            if (history.length > MAX_HISTORY) { history.shift(); } else { historyStep++; }
            updateHistoryUI();
        }

        function undo() { if (historyStep > 0) { historyStep--; restoreHistory(); showToast('已撤销'); } }
        function redo() { if (historyStep < history.length - 1) { historyStep++; restoreHistory(); showToast('已重做'); } }

        function restoreHistory() {
            const img = new Image();
            img.onload = () => { ctx.clearRect(0, 0, 1200, 800); ctx.drawImage(img, 0, 0, 1200, 800); };
            img.src = history[historyStep]; updateHistoryUI();
        }

        function setStyle() { ctx.lineWidth = currentSize; ctx.strokeStyle = hexToRgba(currentColor, currentOpacity); ctx.fillStyle = hexToRgba(currentColor, currentOpacity); }
        function hexToRgba(hex, a) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `rgba(${r},${g},${b},${a})`; }

        function saveSnap() { tempCanvas = document.createElement('canvas'); tempCanvas.width = canvas.width; tempCanvas.height = canvas.height; tempCanvas.getContext('2d').drawImage(canvas, 0, 0); }
        function restoreSnap() { if (tempCanvas) { ctx.clearRect(0, 0, 1200, 800); ctx.drawImage(tempCanvas, 0, 0, 1200, 800); } }

        function bindEvents() {
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('mouseleave', onMouseLeave);

            document.querySelectorAll('.tool[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTool = btn.dataset.tool;
                    document.getElementById('toolName').textContent = toolNames[currentTool];
                });
            });

            document.querySelectorAll('.swatch').forEach(s => {
                s.addEventListener('click', () => {
                    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
                    s.classList.add('active');
                    currentColor = s.dataset.color;
                    if (currentColor === 'custom') currentColor = document.getElementById('customColor').value;
                    updateColorUI(); updateGlow(currentColor);
                });
            });

            document.getElementById('customColor').addEventListener('input', (e) => {
                currentColor = e.target.value;
                document.getElementById('colorHex').value = currentColor.toUpperCase();
                document.querySelector('.swatch.custom').style.background = currentColor;
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                document.querySelector('.swatch.custom').classList.add('active');
                updateGlow(currentColor); updateBrushPreview();
            });

            document.getElementById('brushSize').addEventListener('input', (e) => {
                currentSize = parseInt(e.target.value);
                document.getElementById('sizeVal').textContent = currentSize + 'px';
                updateSliderFill(e.target, 'sizeFill');
                updateBrushPreview();
            });

            document.getElementById('opacity').addEventListener('input', (e) => {
                currentOpacity = parseInt(e.target.value) / 100;
                document.getElementById('opacityVal').textContent = e.target.value + '%';
                updateSliderFill(e.target, 'opacityFill');
            });

            document.getElementById('btnUndo').addEventListener('click', undo);
            document.getElementById('btnRedo').addEventListener('click', redo);
            document.getElementById('btnClear').addEventListener('click', () => { if (confirm('清空画布？')) { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 1200, 800); saveHistory(); } });
            document.getElementById('btnSave').addEventListener('click', () => { const link = document.createElement('a'); link.download = `canvas-${Date.now()}.png`; link.href = canvas.toDataURL(); link.click(); showToast('已保存'); });
            document.getElementById('btnNew').addEventListener('click', () => { if (confirm('新建画布？')) { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 1200, 800); history = []; historyStep = -1; saveHistory(); } });

            document.getElementById('btnZoomIn').addEventListener('click', () => { zoomLevel = Math.min(zoomLevel + 0.1, 3); canvas.style.transform = `scale(${zoomLevel})`; document.getElementById('zoomVal').textContent = Math.round(zoomLevel * 100) + '%'; });
            document.getElementById('btnZoomOut').addEventListener('click', () => { zoomLevel = Math.max(zoomLevel - 0.1, 0.3); canvas.style.transform = `scale(${zoomLevel})`; document.getElementById('zoomVal').textContent = Math.round(zoomLevel * 100) + '%'; });

            document.getElementById('btnAIPanel').addEventListener('click', () => document.getElementById('aiPanel').classList.add('open'));
            document.getElementById('btnCloseAI').addEventListener('click', () => document.getElementById('aiPanel').classList.remove('open'));

            document.querySelectorAll('.ai-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.ai-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.ai-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(tab.dataset.mode + 'Content').classList.add('active');
                });
            });

            document.querySelectorAll('.ai-style').forEach(btn => {
                btn.addEventListener('click', () => { document.querySelectorAll('.ai-style').forEach(b => b.classList.remove('active')); btn.classList.add('active'); });
            });

            document.querySelectorAll('.ai-size').forEach(btn => {
                btn.addEventListener('click', () => { document.querySelectorAll('.ai-size').forEach(b => b.classList.remove('active')); btn.classList.add('active'); });
            });

            document.getElementById('btnGenText').addEventListener('click', generateText2Img);
            document.getElementById('btnGenImg').addEventListener('click', generateImg2Img);

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
                    if (e.key === 'y') { e.preventDefault(); redo(); }
                    if (e.key === 's') { e.preventDefault(); document.getElementById('btnSave').click(); }
                }
            });
        }

        function onMouseDown(e) {
            isDrawing = true;
            const pos = getPos(e);
            lastPos = pos; startPos = pos;
            setStyle();
            if (currentTool === 'pen') { ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x + 0.1, pos.y + 0.1); ctx.stroke(); }
            else if (currentTool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
            else if (['line', 'rect', 'circle'].includes(currentTool)) saveSnap();
            else if (currentTool === 'fill') { ctx.fillStyle = hexToRgba(currentColor, currentOpacity); ctx.fillRect(0, 0, 1200, 800); isDrawing = false; saveHistory(); }
            else if (currentTool === 'picker') {
                const p = ctx.getImageData(pos.x * (window.devicePixelRatio || 1), pos.y * (window.devicePixelRatio || 1), 1, 1).data;
                currentColor = '#' + [p[0], p[1], p[2]].map(v => v.toString(16).padStart(2, '0')).join('');
                updateColorUI(); updateGlow(currentColor); isDrawing = false; showToast('已取色 ' + currentColor);
            }
            setStatus('draw');
        }

        function onMouseMove(e) {
            const pos = getPos(e);
            document.getElementById('coords').textContent = `x: ${Math.round(pos.x)}, y: ${Math.round(pos.y)}`;
            if (!isDrawing) return;
            if (currentTool === 'pen') {
                if (lastPos) { const mx = (lastPos.x + pos.x) / 2, my = (lastPos.y + pos.y) / 2; ctx.quadraticCurveTo(lastPos.x, lastPos.y, mx, my); ctx.stroke(); ctx.beginPath(); ctx.moveTo(mx, my); }
                lastPos = pos;
            } else if (currentTool === 'eraser') { ctx.lineTo(pos.x, pos.y); ctx.stroke(); lastPos = pos; }
            else if (['line', 'rect', 'circle'].includes(currentTool) && startPos) {
                restoreSnap(); setStyle();
                if (currentTool === 'line') { ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
                else if (currentTool === 'rect') ctx.strokeRect(startPos.x, startPos.y, pos.x - startPos.x, pos.y - startPos.y);
                else if (currentTool === 'circle') { const r = Math.sqrt((pos.x - startPos.x) ** 2 + (pos.y - startPos.y) ** 2); ctx.beginPath(); ctx.arc(startPos.x, startPos.y, r, 0, Math.PI * 2); ctx.stroke(); }
            }
        }

        function onMouseUp(e) {
            if (!isDrawing) return;
            isDrawing = false;
            const pos = getPos(e);
            if (currentTool === 'pen') { if (lastPos) { ctx.lineTo(pos.x, pos.y); ctx.stroke(); } }
            else if (currentTool === 'eraser') ctx.globalCompositeOperation = 'source-over';
            else if (['line', 'rect', 'circle'].includes(currentTool) && startPos) {
                restoreSnap(); setStyle();
                if (currentTool === 'line') { ctx.beginPath(); ctx.moveTo(startPos.x, startPos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
                else if (currentTool === 'rect') ctx.strokeRect(startPos.x, startPos.y, pos.x - startPos.x, pos.y - startPos.y);
                else if (currentTool === 'circle') { const r = Math.sqrt((pos.x - startPos.x) ** 2 + (pos.y - startPos.y) ** 2); ctx.beginPath(); ctx.arc(startPos.x, startPos.y, r, 0, Math.PI * 2); ctx.stroke(); }
                startPos = null; tempCanvas = null;
            }
            lastPos = null; saveHistory(); setStatus('ready');
        }

        function onMouseLeave() {
            if (isDrawing) {
                if (['line', 'rect', 'circle'].includes(currentTool)) { restoreSnap(); startPos = null; tempCanvas = null; }
                isDrawing = false; lastPos = null; setStatus('ready');
            }
        }

        function updateColorUI() { document.getElementById('colorHex').value = currentColor.toUpperCase(); document.getElementById('customColor').value = currentColor; updateBrushPreview(); }
        function updateBrushPreview() { const dot = document.getElementById('brushPreview'); dot.style.width = currentSize + 'px'; dot.style.height = currentSize + 'px'; dot.style.background = currentColor; dot.style.opacity = currentOpacity; }
        function updateSliderFill(input, id) { const p = ((input.value - input.min) / (input.max - input.min)) * 100; document.getElementById(id).style.width = `calc(${p}% - 24px)`; }
        function updateHistoryUI() { document.getElementById('historyInfo').textContent = `历史: ${historyStep + 1}/${history.length}`; document.getElementById('btnUndo').style.opacity = historyStep > 0 ? '1' : '0.3'; document.getElementById('btnRedo').style.opacity = historyStep < history.length - 1 ? '1' : '0.3'; }
        function setStatus(s) { const dot = document.getElementById('statusDot'), text = document.getElementById('statusText'); if (s === 'draw') { dot.classList.add('draw'); text.textContent = '绘制中...'; } else { dot.classList.remove('draw'); text.textContent = '就绪'; } }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function updateGlow(hex) { const rgb = { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) }; document.documentElement.style.setProperty('--accent', `rgb(${rgb.r},${rgb.g},${rgb.b})`); document.documentElement.style.setProperty('--accent-glow', `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`); }

        async function generateText2Img() {
            const prompt = document.getElementById('aiPrompt').value.trim();
            if (!prompt) { showToast('请输入描述'); return; }
            const style = document.querySelector('.ai-style.active')?.dataset.style || 'default';
            const size = document.querySelector('.ai-size.active')?.dataset.size || '1024x1024';
            const [w, h] = size.split('x');
            document.getElementById('aiOverlay').classList.add('show');
            try {
                const fullPrompt = encodeURIComponent(prompt + stylePrompts[style] + ', high quality, detailed');
                const url = `https://image.pollinations.ai/prompt/${fullPrompt}?width=${w}&height=${h}&nologo=true&seed=${Date.now()}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('fail');
                const blob = await res.blob();
                const imgUrl = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(1200 / img.width, 800 / img.height, 1);
                    const dw = img.width * scale, dh = img.height * scale;
                    saveHistory();
                    ctx.drawImage(img, (1200 - dw) / 2, (800 - dh) / 2, dw, dh);
                    saveHistory();
                    showToast('AI 生成完成！');
                };
                img.src = imgUrl;
            } catch (err) { showToast('生成失败，请重试'); }
            finally { document.getElementById('aiOverlay').classList.remove('show'); }
        }

        async function generateImg2Img() {
            const prompt = document.getElementById('aiImgPrompt').value.trim() || 'enhance, improve quality';
            document.getElementById('aiOverlay').classList.add('show');
            try {
                const fullPrompt = encodeURIComponent(prompt + ', based on sketch, detailed');
                const url = `https://image.pollinations.ai/prompt/${fullPrompt}?width=1024&height=1024&nologo=true&seed=${Date.now()}`;
                const res = await fetch(url);
                const blob = await res.blob();
                const imgUrl = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(1200 / img.width, 800 / img.height, 1);
                    saveHistory();
                    ctx.drawImage(img, (1200 - img.width * scale) / 2, (800 - img.height * scale) / 2, img.width * scale, img.height * scale);
                    saveHistory();
                    showToast('优化完成！');
                };
                img.src = imgUrl;
            } catch (err) { showToast('生成失败'); }
            finally { document.getElementById('aiOverlay').classList.remove('show'); }
        }

        init();
    </script>
</body>
</html>
