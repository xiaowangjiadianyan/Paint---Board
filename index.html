<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <base href="/Paint - Board>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint - Board</title>
   <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 动态环境光晕 -->
    <div class="ambient-glow glow-1" id="glow1"></div>
    <div class="ambient-glow glow-2" id="glow2"></div>
    <div class="ambient-glow glow-3" id="glow3"></div>
    <div class="ambient-glow glow-4" id="glow4"></div>
    
    <!-- 边缘流光粒子 -->
    <div class="edge-particles" id="edgeParticles"></div>

    <!-- AI 生成进度遮罩 -->
    <div class="ai-overlay" id="aiOverlay">
        <div class="ai-loading">
            <div class="ai-spinner"></div>
            <div class="ai-loading-text">AI 正在创作中...</div>
            <div class="ai-loading-sub">请稍候，艺术即将呈现</div>
        </div>
    </div>

    <!-- 顶部工具栏 -->
    <div class="top-toolbar glass-panel">
        <div class="logo">
            <div class="logo-icon" id="logoIcon">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.82 0 3.53-.5 5-1.35-2.99-1.73-5-4.95-5-8.65s2.01-6.92 5-8.65C15.53 2.5 13.82 2 12 2z"/>
                </svg>
            </div>
            <span class="logo-text">Liquid Canvas <span class="ai-badge">AI</span></span>
        </div>
        
        <div class="divider"></div>
        
        <div class="tool-group">
            <button class="tool-btn" id="btn-undo" data-tooltip="撤销 Ctrl+Z">
                <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <button class="tool-btn" id="btn-redo" data-tooltip="重做 Ctrl+Y">
                <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
            </button>
        </div>
        
        <div class="divider"></div>
        
        <div class="tool-group">
            <button class="tool-btn" id="btn-new" data-tooltip="新建画布">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/>
                    <circle cx="18" cy="18" r="5" fill="currentColor" opacity="0.9"/>
                    <path d="M18 15v6M15 18h6" stroke="var(--bg-deep)" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-open" data-tooltip="打开图片">
                <svg viewBox="0 0 24 24">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
                    <path d="M12 10v6M9 13l3-3 3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-save" data-tooltip="保存图片">
                <svg viewBox="0 0 24 24">
                    <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
                </svg>
            </button>
        </div>
        
        <div class="divider"></div>
        
        <div class="tool-group">
            <button class="tool-btn" id="btn-clear" data-tooltip="清空画布">
                <svg viewBox="0 0 24 24">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z"/>
                    <path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    <path d="M8 9v8M12 9v8M16 9v8" stroke="currentColor" stroke-width="1" opacity="0.6"/>
                </svg>
            </button>
        </div>

        <div class="toolbar-spacer"></div>

        <!-- AI 快捷按钮 -->
        <button class="tool-btn ai-tool-btn" id="btn-ai-quick" data-tooltip="AI 智能生成">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
            </svg>
        </button>

        <div class="zoom-controls">
            <button class="tool-btn" id="btn-zoom-out" data-tooltip="缩小画布">
                <svg viewBox="0 0 24 24">
                    <circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M15 15l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 10h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <span class="zoom-value" id="zoomValue">100%</span>
            <button class="tool-btn" id="btn-zoom-in" data-tooltip="放大画布">
                <svg viewBox="0 0 24 24">
                    <circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M15 15l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 10h6M10 7v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 左侧工具栏 -->
    <div class="left-sidebar glass-panel">
        <button class="sidebar-tool active" data-tool="pen" data-tooltip="画笔工具 - 自由绘制">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/>
                    <path d="M20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" opacity="0.7"/>
                </svg>
                <span class="tool-label">画笔</span>
            </div>
        </button>
        
        <button class="sidebar-tool" data-tool="eraser" data-tooltip="橡皮擦 - 擦除内容">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20h7.34l7.63-7.63c.78-.78.78-2.05 0-2.83l-4.24-4.24c-.39-.39-.9-.59-1.41-.59z"/>
                    <path d="M5.03 18.59l-1.41-1.41 8.49-8.49 1.41 1.41-8.49 8.49z" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
                </svg>
                <span class="tool-label">橡皮</span>
            </div>
        </button>
        
        <button class="sidebar-tool" data-tool="line" data-tooltip="直线工具 - 绘制直线">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="4" cy="20" r="2" fill="currentColor"/>
                    <circle cx="20" cy="4" r="2" fill="currentColor"/>
                </svg>
                <span class="tool-label">直线</span>
            </div>
        </button>
        
        <button class="sidebar-tool" data-tool="rect" data-tooltip="矩形工具 - 绘制矩形">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <rect x="4" y="6" width="16" height="12" fill="none" stroke="currentColor" stroke-width="2" rx="2"/>
                    <rect x="7" y="9" width="10" height="6" fill="currentColor" opacity="0.2"/>
                </svg>
                <span class="tool-label">矩形</span>
            </div>
        </button>
        
        <button class="sidebar-tool" data-tool="circle" data-tooltip="圆形工具 - 绘制圆形">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.3"/>
                    <circle cx="12" cy="12" r="1" fill="currentColor"/>
                </svg>
                <span class="tool-label">圆形</span>
            </div>
        </button>
        
        <button class="sidebar-tool" data-tool="fill" data-tooltip="填充工具 - 填充区域">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <path d="M19 3l-3 3-2-2 3-3 2 2z"/>
                    <path d="M14 6l-8 8v6h6l8-8-6-6z" fill="currentColor" opacity="0.8"/>
                    <path d="M3 21h8v-2H3v2z" fill="currentColor" opacity="0.5"/>
                </svg>
                <span class="tool-label">填充</span>
            </div>
        </button>
        
        <div class="sidebar-divider"></div>
        
        <button class="sidebar-tool" data-tool="picker" data-tooltip="取色器 - 吸取颜色">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42z"/>
                    <circle cx="5.5" cy="18.5" r="2" fill="currentColor" opacity="0.4"/>
                </svg>
                <span class="tool-label">取色</span>
            </div>
        </button>

        <!-- AI 工具入口 -->
        <button class="sidebar-tool ai-sidebar-tool" data-tool="ai" data-tooltip="AI 辅助绘画">
            <div class="tool-icon-wrap">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="currentColor"/>
                    <circle cx="12" cy="12" r="3" fill="var(--bg-deep)" opacity="0.8"/>
                </svg>
                <span class="tool-label">AI</span>
            </div>
        </button>
    </div>

    <!-- 画布区域 -->
    <div class="canvas-wrapper" id="canvasWrapper">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="canvas" width="1200" height="800"></canvas>
        </div>
    </div>
    
    <div class="canvas-info glass-badge" id="canvasInfo">1200 × 800 px</div>

    <!-- 底部状态栏 -->
    <div class="status-bar glass-panel">
        <div class="status-left">
            <div class="status-item">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="status-text">就绪</span>
            </div>
            <span class="status-separator">|</span>
            <span id="current-tool-name">画笔工具</span>
            <span class="status-separator">|</span>
            <span id="coords">x: 0, y: 0</span>
        </div>
        <div class="status-right">
            <span id="history-info">历史: 0/0</span>
        </div>
    </div>

    <!-- 右侧属性面板 -->
    <div class="right-panel glass-panel" id="rightPanel">
        <!-- 颜色 -->
        <div class="panel-section">
            <div class="panel-header">
                <div class="panel-title">颜色</div>
                <div class="panel-accent" id="panelAccent"></div>
            </div>
            <div class="color-grid">
                <div class="color-swatch active" style="background: #0f172a;" data-color="#0f172a"></div>
                <div class="color-swatch" style="background: #f8fafc;" data-color="#f8fafc"></div>
                <div class="color-swatch" style="background: #ef4444;" data-color="#ef4444"></div>
                <div class="color-swatch" style="background: #f97316;" data-color="#f97316"></div>
                <div class="color-swatch" style="background: #eab308;" data-color="#eab308"></div>
                <div class="color-swatch" style="background: #22c55e;" data-color="#22c55e"></div>
                <div class="color-swatch" style="background: #3b82f6;" data-color="#3b82f6"></div>
                <div class="color-swatch" style="background: #8b5cf6;" data-color="#8b5cf6"></div>
                <div class="color-swatch" style="background: #ec4899;" data-color="#ec4899"></div>
                <div class="color-swatch" style="background: #06b6d4;" data-color="#06b6d4"></div>
                <div class="color-swatch" style="background: #64748b;" data-color="#64748b"></div>
                <div class="color-swatch custom" data-color="custom"></div>
            </div>
            <div class="color-input-wrapper glass-input">
                <input type="color" id="customColor" value="#3b82f6">
                <input type="text" id="colorHex" value="#3B82F6" readonly>
                <button class="color-copy" id="btnCopyColor" title="复制色值">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>

        <!-- 笔刷大小 -->
        <div class="panel-section">
            <div class="panel-header">
                <div class="panel-title">笔刷大小</div>
                <div class="panel-accent" id="panelAccent2"></div>
            </div>
            <div class="slider-control">
                <div class="slider-header">
                    <span class="slider-label">粗细</span>
                    <span class="slider-value glass-badge" id="sizeValue">5px</span>
                </div>
                <div class="slider-track glass-slider">
                    <input type="range" id="brushSize" min="1" max="100" value="5">
                    <div class="slider-fill" id="sizeFill"></div>
                </div>
            </div>
            <div class="brush-preview glass-card">
                <div class="brush-preview-dot" id="brushPreview" style="width: 5px; height: 5px;"></div>
            </div>
        </div>

        <!-- 不透明度 -->
        <div class="panel-section">
            <div class="panel-header">
                <div class="panel-title">不透明度</div>
                <div class="panel-accent" id="panelAccent3"></div>
            </div>
            <div class="slider-control">
                <div class="slider-header">
                    <span class="slider-label">透明度</span>
                    <span class="slider-value glass-badge" id="opacityValue">100%</span>
                </div>
                <div class="slider-track glass-slider">
                    <input type="range" id="opacity" min="0" max="100" value="100">
                    <div class="slider-fill" id="opacityFill"></div>
                </div>
            </div>
        </div>

        <!-- 画布设置 -->
        <div class="panel-section">
            <div class="panel-header">
                <div class="panel-title">画布设置</div>
                <div class="panel-accent" id="panelAccent4"></div>
            </div>
            <div class="slider-control">
                <div class="slider-header">
                    <span class="slider-label">宽度</span>
                    <span class="slider-value glass-badge" id="widthValue">1200px</span>
                </div>
                <div class="slider-track glass-slider">
                    <input type="range" id="canvasWidth" min="400" max="2400" value="1200" step="10">
                    <div class="slider-fill" id="widthFill"></div>
                </div>
            </div>
            <div class="slider-control">
                <div class="slider-header">
                    <span class="slider-label">高度</span>
                    <span class="slider-value glass-badge" id="heightValue">800px</span>
                </div>
                <div class="slider-track glass-slider">
                    <input type="range" id="canvasHeight" min="300" max="1600" value="800" step="10">
                    <div class="slider-fill" id="heightFill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 面板（默认隐藏） -->
    <div class="ai-panel glass-panel" id="aiPanel">
        <div class="ai-panel-header">
            <div class="ai-panel-title">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z" fill="currentColor"/>
                </svg>
                <span>AI 智能绘画</span>
            </div>
            <button class="ai-panel-close" id="btnCloseAiPanel">
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>

        <!-- AI 模式切换 -->
        <div class="ai-mode-tabs">
            <button class="ai-mode-tab active" data-ai-mode="text2img">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
                文生图
            </button>
            <button class="ai-mode-tab" data-ai-mode="img2img">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                    <circle cx="18" cy="6" r="2" fill="currentColor"/>
                </svg>
                图生图
            </button>
            <button class="ai-mode-tab" data-ai-mode="inpaint">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                智能补全
            </button>
        </div>

        <!-- 文生图模式 -->
        <div class="ai-mode-content active" id="text2imgContent">
            <div class="ai-input-group">
                <label class="ai-label">描述你想画的画面</label>
                <textarea class="ai-textarea glass-input" id="aiPrompt" placeholder="例如：一只可爱的橘猫在樱花树下睡觉，水彩风格，柔和光线..." rows="4"></textarea>
            </div>
            
            <div class="ai-input-group">
                <label class="ai-label">风格选择</label>
                <div class="ai-style-grid">
                    <button class="ai-style-btn active" data-style="default">默认</button>
                    <button class="ai-style-btn" data-style="anime">动漫</button>
                    <button class="ai-style-btn" data-style="watercolor">水彩</button>
                    <button class="ai-style-btn" data-style="oil">油画</button>
                    <button class="ai-style-btn" data-style="sketch">素描</button>
                    <button class="ai-style-btn" data-style="cyberpunk">赛博</button>
                </div>
            </div>

            <div class="ai-input-group">
                <label class="ai-label">图片尺寸</label>
                <div class="ai-size-options">
                    <button class="ai-size-btn active" data-size="1024x1024">1:1</button>
                    <button class="ai-size-btn" data-size="1024x768">4:3</button>
                    <button class="ai-size-btn" data-size="768x1024">3:4</button>
                    <button class="ai-size-btn" data-size="1024x576">16:9</button>
                </div>
            </div>

            <button class="ai-generate-btn" id="btnGenerateText">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
                </svg>
                生成图片
            </button>
        </div>

        <!-- 图生图模式 -->
        <div class="ai-mode-content" id="img2imgContent">
            <div class="ai-input-group">
                <label class="ai-label">基于当前画布</label>
                <div class="ai-current-canvas-preview" id="aiCanvasPreview">
                    <div class="ai-preview-placeholder">当前画布内容将作为参考</div>
                </div>
            </div>

            <div class="ai-input-group">
                <label class="ai-label">优化描述（可选）</label>
                <textarea class="ai-textarea glass-input" id="aiImgPrompt" placeholder="描述你想要的优化方向，例如：增强色彩、添加细节..." rows="2"></textarea>
            </div>

            <div class="ai-input-group">
                <label class="ai-label">重绘强度</label>
                <div class="slider-track glass-slider">
                    <input type="range" id="aiStrength" min="10" max="100" value="70">
                    <div class="slider-fill" id="aiStrengthFill"></div>
                </div>
                <div class="ai-strength-labels">
                    <span>保留原图</span>
                    <span id="aiStrengthValue">70%</span>
                    <span>完全重绘</span>
                </div>
            </div>

            <button class="ai-generate-btn" id="btnGenerateImg">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
                </svg>
                优化画布
            </button>
        </div>

        <!-- 智能补全模式 -->
        <div class="ai-mode-content" id="inpaintContent">
            <div class="ai-input-group">
                <label class="ai-label">使用说明</label>
                <div class="ai-inpaint-guide">
                    <p>1. 在画布上用<strong>矩形工具</strong>框选需要补全的区域</p>
                    <p>2. 输入描述告诉 AI 要填充什么</p>
                    <p>3. 点击生成，AI 会自动补全选中区域</p>
                </div>
            </div>

            <div class="ai-input-group">
                <label class="ai-label">补全描述</label>
                <textarea class="ai-textarea glass-input" id="aiInpaintPrompt" placeholder="例如：在这片区域画一片星空..." rows="2"></textarea>
            </div>

            <button class="ai-generate-btn" id="btnGenerateInpaint" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
                </svg>
                智能补全
            </button>
        </div>

        <!-- AI 历史记录 -->
        <div class="ai-history-section">
            <div class="ai-history-header">
                <span class="ai-label">生成历史</span>
                <button class="ai-clear-history" id="btnClearAiHistory">清空</button>
            </div>
            <div class="ai-history-grid" id="aiHistoryGrid"></div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="js/main.js"></script> 
</body>
</html>
